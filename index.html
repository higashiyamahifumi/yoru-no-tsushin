<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>夜の通信</title>
  <meta name="description" content="夜の通信 - 2026.04.04 Koenji Fourth Floor II" />

  <style>
    :root{
      color-scheme: dark;
      --bg:#000;
      --fg:#fff;

      /* あの青 */
      --blue:#0A27FF;

      /* 予約ボタン（黄色） */
      --accent:#FFD400;
      --accentText:#000;

      --line1: rgba(255,255,255,.18);
      --line2: rgba(255,255,255,.12);
    }

    body{
      margin:0;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      line-height:1.7;
      letter-spacing:.01em;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    a{ color:inherit; }

    /* ===== Background: “cracked screen” vertical blue lines ===== */
    .bg{
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: var(--bg);
      overflow: hidden;
    }
    /* うっすら青い縦ライン（3〜4本） */
    .bg::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(to bottom, rgba(10,39,255,0) 0%, rgba(10,39,255,.55) 10%, rgba(10,39,255,.55) 90%, rgba(10,39,255,0) 100%) 12% 0 / 1px 100% no-repeat,
        linear-gradient(to bottom, rgba(10,39,255,0) 0%, rgba(10,39,255,.45) 18%, rgba(10,39,255,.45) 82%, rgba(10,39,255,0) 100%) 38% 0 / 1px 100% no-repeat,
        linear-gradient(to bottom, rgba(10,39,255,0) 0%, rgba(10,39,255,.60) 6%,  rgba(10,39,255,.60) 94%, rgba(10,39,255,0) 100%) 71% 0 / 1px 100% no-repeat,
        linear-gradient(to bottom, rgba(10,39,255,0) 0%, rgba(10,39,255,.35) 25%, rgba(10,39,255,.35) 75%, rgba(10,39,255,0) 100%) 88% 0 / 1px 100% no-repeat;
      opacity: .9;
      filter: blur(.15px);
    }
    /* “割れ”の雰囲気：ところどころ欠ける小ノイズ（任意・控えめ） */
    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(10,39,255,.12) 0px,
          rgba(10,39,255,.12) 2px,
          rgba(10,39,255,0) 2px,
          rgba(10,39,255,0) 18px
        );
      opacity:.12;
      mask-image: radial-gradient(ellipse at 50% 35%, rgba(0,0,0,.9) 0%, rgba(0,0,0,0) 60%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 35%, rgba(0,0,0,.9) 0%, rgba(0,0,0,0) 60%);
      pointer-events:none;
    }

    /* ===== Layout ===== */
    .wrap{ max-width: 900px; margin: 0 auto; padding: 26px 18px 80px; }

    .headrow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:16px;
      padding: 8px 0 18px;
      border-bottom: 1px solid var(--line1);
    }
    h1{
      margin:0;
      font-size:40px;
      letter-spacing:.06em;
      font-weight:600;
      line-height:1.1;
    }
    .sub{
      margin:14px 0 0;
      opacity:.88;
      font-weight:500;
      font-size:13px;
      letter-spacing:.06em;
    }

    .lang{
      display:flex;
      gap:10px;
      align-items:baseline;
      font-size:11px;
      letter-spacing:.14em;
      font-weight:600;
      white-space:nowrap;
      opacity:.9;
    }
    .lang a{ text-decoration:none; opacity:.7; }
    .lang a.active{ opacity:1; }
    .lang a:hover{ opacity:.95; }

    section{
      padding:20px 0;
      border-bottom: 1px solid var(--line2);
    }
    h2{
      margin:0 0 10px;
      font-size:12px;
      letter-spacing:.16em;
      font-weight:600;
      opacity:.92;
    }
    .lines{ font-weight:500; }
    .lines div{ margin:2px 0; }

    .muted{ opacity:.78; }
    .small{ font-size:13px; }

    .lineup{ font-weight:600; opacity:1; letter-spacing:.04em; }

    /* ===== Yellow reserve button ===== */
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;

      margin-top:18px;
      padding:12px 16px;

      background: var(--accent);
      color: var(--accentText);

      border: 1px solid rgba(0,0,0,.35);
      border-radius:999px;

      text-decoration:none;
      letter-spacing:.14em;
      font-weight:700;
      font-size:12px;

      box-shadow: 0 6px 22px rgba(255, 212, 0, .22);
    }
    .btn:hover{ opacity:.92; }
    .btn:active{ transform: translateY(1px); }
    .btn:focus-visible{
      outline: 2px solid rgba(255, 212, 0, .9);
      outline-offset: 3px;
    }

    @media (max-width:420px){
      h1{ font-size:34px; }
      .sub{ font-size:12px; }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="wrap">
    <header class="headrow">
      <div>
        <h1>夜の通信</h1>
        <p class="sub">2026.04.04 (Sat) / Koenji Fourth Floor II</p>
      </div>
      <nav class="lang" aria-label="Language">
        <a class="active" href="./index.html" aria-current="page">JP</a>
        <a href="./en.html">EN</a>
      </nav>
    </header>

    <section>
      <h2>TIME TABLE</h2>
      <div class="lines">
        <div>17:00 — Exhibition + DJ / Bar open</div>
        <div>19:00 — Live Performance</div>
      </div>
    </section>

    <section>
      <h2>TICKET</h2>
      <div class="lines">
        <div>U-22：1,500円</div>
        <div>前売：2,000円／当日：2,500円</div>
        <div>＋1ドリンク（別途）</div>
      </div>
    </section>

    <section>
      <h2>VENUE</h2>
      <div class="lines">
        <div><strong>Koenji Fourth Floor II</strong></div>
        <div class="muted small" style="margin-top:6px;">〒166-0003</div>
        <div>東京都杉並区高円寺南4-6-7 第5日東ビルB1</div>
        <div style="margin-top:10px;">
          <a href="https://maps.app.goo.gl/5qVKebVzXAnNLyhq9" target="_blank" rel="noopener">Googleマップを開く</a>
        </div>
      </div>
    </section>

    <section style="border-bottom:none;">
      <h2>LINEUP</h2>
      <div class="lines lineup">
        <div>- 中西優</div>
        <div>- 東山一二三</div>
        <div>- and more</div>
      </div>

      <a class="btn" href="https://forms.gle/5CpELw5eLm4boTpc7" target="_blank" rel="noopener">
        予約する
      </a>
    </section>
  </div>
</body>
</html>
