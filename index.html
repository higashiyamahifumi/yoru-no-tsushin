<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>夜の通信</title>
  <meta name="description" content="夜の通信 - 2026.04.04 Koenji Fourth Floor II" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root { color-scheme: dark; }
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Hiragino Sans",
        "Noto Sans JP", "Yu Gothic", sans-serif;
      line-height:1.7;
      letter-spacing:.01em;
      background:#000;
      color:#fff;
    }
    a{ color: inherit; }
    .wrap{ max-width: 900px; margin: 0 auto; padding: 26px 18px 80px; }

    /* header row: title + language */
    .headrow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:16px;
      padding: 8px 0 18px;
      border-bottom: 1px solid rgba(255,255,255,.18);
    }
    h1{
      margin:0;
      font-size: 40px;
      letter-spacing:.08em;
      font-weight:600;
      line-height:1.1;
    }
    .lang{
      display:flex;
      gap:10px;
      align-items:baseline;
      font-size: 11px;
      letter-spacing:.12em;
      font-weight:600;
      opacity:.85;
      white-space:nowrap;
    }
    .lang a{
      text-decoration:none;
      opacity:.7;
    }
    .lang a.active{ opacity:1; }
    .lang a:hover{ opacity:.95; }

    .sub{
      margin:14px 0 0;
      opacity:.85;
      font-weight:500;
      font-size:14px;
    }

    section{
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    h2{
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing:.16em;
      font-weight:600;
      opacity:.9;
    }
    .lines{ font-weight:500; }
    .lines div{ margin: 2px 0; }

    .muted{ opacity:.78; }
    .small{ font-size: 13px; }

    .btn{
      display:inline-block;
      margin-top:18px;
      padding:12px 16px;
      border:1px solid rgba(255,255,255,.7);
      border-radius:999px;
      text-decoration:none;
      letter-spacing:.10em;
      font-weight:600;
      font-size:13px;
    }
    .btn:hover{ opacity:.9; }

    /* lineup stronger white */
    .lineup{
      font-weight:600;
      opacity:1;
    }

    @media (max-width: 420px){
      h1{ font-size: 34px; }
      .sub{ font-size: 13px; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header class="headrow">
      <div>
        <h1>夜の通信</h1>
        <p class="sub">2026.04.04 (Sat) / Koenji Fourth Floor II</p>
      </div>

      <nav class="lang" aria-label="Language">
        <a class="active" href="./index.html" aria-current="page">JP</a>
        <a href="./en.html">EN</a>
      </nav>
    </header>

    <section>
      <h2>TIME TABLE</h2>
      <div class="lines">
        <div>17:00 — Exhibition + DJ / Bar open</div>
        <div>19:00 — Live Performance</div>
      </div>
    </section>

    <section>
      <h2>TICKET</h2>
      <div class="lines">
        <div>U-22：1,500円</div>
        <div>前売：2,000円／当日：2,500円</div>
        <div>＋1ドリンク（別途）</div>
      </div>
    </section>

    <section>
      <h2>VENUE</h2>
      <div class="lines">
        <div><strong>Koenji Fourth Floor II</strong></div>
        <div class="muted small" style="margin-top:6px;">〒166-0003</div>
        <div>東京都杉並区高円寺南4-6-7 第5日東ビルB1</div>
        <div style="margin-top:10px;">
          <a href="https://maps.app.goo.gl/5qVKebVzXAnNLyhq9" target="_blank" rel="noopener">Googleマップを開く</a>
        </div>
      </div>
    </section>

    <section style="border-bottom:none;">
      <h2>LINEUP</h2>
      <div class="lines lineup">
        <div>- 中西優</div>
        <div>- 東山一二三</div>
        <div>- and more</div>
      </div>

      <a class="btn" href="https://forms.gle/5CpELw5eLm4boTpc7" target="_blank" rel="noopener">
        予約する
      </a>
    </section>

  </div>
</body>
</html>
