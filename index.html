<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>夜の通信</title>
  <meta name="description" content="夜の通信 - 2026.04.04 Koenji Fourth Floor II" />

  <style>
    :root{
      color-scheme: dark;
      --bg:#000;
      --fg:#fff;
      --blob:#0A27FF;
      --line1: rgba(255,255,255,.18);
      --line2: rgba(255,255,255,.12);
    }

    body{
      margin:0;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      line-height:1.7;
      letter-spacing:.01em;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    a{ color:inherit; }

    /* ===== Background (CSS only / flat blue blobs) ===== */
    .bg{
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      overflow:hidden;
      background: var(--bg);
    }

    /* でかい縦blob（あなたの画像のシルエット寄り） */
    .bg::before{
      content:"";
      position:absolute;
      inset:-12%;
      background-repeat:no-repeat;
      background-position: 55% 48%;
      background-size: min(920px, 110vmin) auto;
      opacity:1;
      transform: rotate(-6deg);

      /* SVGをdata URIで埋め込み（ベタ塗り） */
      background-image: url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 1200'>\
<path fill='%230A27FF' d='M356 44c86 18 170 84 169 165-1 81-91 124-105 185-14 61 48 125 30 184-18 59-116 74-131 125-15 51 55 95 45 148-10 53-99 92-174 97-75 5-136-24-161-79-25-55 12-124 4-188-8-64-61-122-53-184 8-62 78-91 86-149 8-58-45-119-21-176 24-57 125-110 211-128 86-18 157 0 100 0z'/>\
</svg>");
    }

    /* 小さめblob（右上） */
    .bg::after{
      content:"";
      position:absolute;
      width:min(520px, 62vmin);
      height:min(320px, 40vmin);
      right:4vw;
      top:10vh;
      background-repeat:no-repeat;
      background-size:contain;
      background-position:center;
      background-image: url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500'>\
<path fill='%230A27FF' d='M124 270c32-92 170-145 300-187 130-42 252-74 318-18 66 56 76 186 45 278-31 92-102 146-188 162-86 16-187-6-289-32-102-26-206-56-232-130-26-74 14-165 46-73z'/>\
</svg>");
      transform: rotate(10deg);
      opacity:1;
    }

    /* ===== Layout ===== */
    .wrap{ max-width:900px; margin:0 auto; padding:26px 18px 80px; }

    .headrow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:16px;
      padding:8px 0 18px;
      border-bottom:1px solid var(--line1);
    }
    h1{
      margin:0;
      font-size:40px;
      letter-spacing:.06em;
      font-weight:600;
      line-height:1.1;
    }
    .sub{
      margin:14px 0 0;
      opacity:.88;
      font-weight:500;
      font-size:13px;
      letter-spacing:.06em;
    }

    .lang{
      display:flex;
      gap:10px;
      align-items:baseline;
      font-size:11px;
      letter-spacing:.14em;
      font-weight:600;
      white-space:nowrap;
      opacity:.9;
    }
    .lang a{ text-decoration:none; opacity:.7; }
    .lang a.active{ opacity:1; }
    .lang a:hover{ opacity:.95; }

    section{
      padding:20px 0;
      border-bottom:1px solid var(--line2);
    }
    h2{
      margin:0 0 10px;
      font-size:12px;
      letter-spacing:.16em;
      font-weight:600;
      opacity:.92;
    }
    .lines{ font-weight:500; }
    .lines div{ margin:2px 0; }

    .muted{ opacity:.78; }
    .small{ font-size:13px; }

    .lineup{ font-weight:600; opacity:1; letter-spacing:.04em; }

    .btn{
      display:inline-block;
      margin-top:18px;
      padding:12px 16px;
      border:1px solid rgba(255,255,255,.75);
      border-radius:999px;
      text-decoration:none;
      letter-spacing:.14em;
      font-weight:600;
      font-size:12px;
      background:transparent;
    }
    .btn:hover{ opacity:.9; }

    @media (max-width:420px){
      h1{ font-size:34px; }
      .sub{ font-size:12px; }
    }

    /* motion respect */
    @media (prefers-reduced-motion: reduce){
      .bg::before, .bg::after{ animation:none !important; }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="wrap">
    <header class="headrow">
      <div>
        <h1>夜の通信</h1>
        <p class="sub">2026.04.04 (Sat) / Koenji Fourth Floor II</p>
      </div>
      <nav class="lang" aria-label="Language">
        <a class="active" href="./index.html" aria-current="page">JP</a>
        <a href="./en.html">EN</a>
      </nav>
    </header>

    <section>
      <h2>TIME TABLE</h2>
      <div class="lines">
        <div>17:00 — Exhibition + DJ / Bar open</div>
        <div>19:00 — Live Performance</div>
      </div>
    </section>

    <section>
      <h2>TICKET</h2>
      <div class="lines">
        <div>U-22：1,500円</div>
        <div>前売：2,000円／当日：2,500円</div>
        <div>＋1ドリンク（別途）</div>
      </div>
    </section>

    <section>
      <h2>VENUE</h2>
      <div class="lines">
        <div><strong>Koenji Fourth Floor II</strong></div>
        <div class="muted small" style="margin-top:6px;">〒166-0003</div>
        <div>東京都杉並区高円寺南4-6-7 第5日東ビルB1</div>
        <div style="margin-top:10px;">
          <a href="https://maps.app.goo.gl/5qVKebVzXAnNLyhq9" target="_blank" rel="noopener">Googleマップを開く</a>
        </div>
      </div>
    </section>

    <section style="border-bottom:none;">
      <h2>LINEUP</h2>
      <div class="lines lineup">
        <div>- 中西優</div>
        <div>- 東山一二三</div>
        <div>- and more</div>
      </div>

      <a class="btn" href="https://forms.gle/5CpELw5eLm4boTpc7" target="_blank" rel="noopener">
        予約する
      </a>
    </section>
  </div>
</body>
</html>
